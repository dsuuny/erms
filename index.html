<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Navigator Application - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Geist', 'Geist Fallback', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        :root {
            --background: oklch(1 0 0);
            --foreground: oklch(0.145 0 0);
            --card: oklch(1 0 0);
            --card-foreground: oklch(0.145 0 0);
            --primary: oklch(0.205 0 0);
            --primary-foreground: oklch(0.985 0 0);
            --border: oklch(0.922 0 0);
            --input: oklch(0.922 0 0);
            --ring: oklch(0.708 0 0);
        }

        /* Button Sign Up Hover Animation */
        .btn-signup:hover {
            transform: scale(1.02);
        }

        /* Button Login SSO Hover Animation */
        .btn-login-sso:hover {
            transform: scale(1.02);
        }

        /* Input Focus Effect */
        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(100, 181, 246, 0.5);
        }
    </style>
</head>
<body class="bg-gray-50">
    <main class="min-h-screen bg-white flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <img 
                    src="./public/images/logo.png" 
                    alt="DNA - Data Navigator Application Logo" 
                    width="200" 
                    height="200" 
                    class="drop-shadow-lg"
                />
            </div>

            <!-- Login Card -->
            <div class="bg-white rounded-2xl p-8 shadow-xl border border-gray-200">
                <h1 class="text-2xl font-bold text-center text-[#0a1628] mb-2">
                    Welcome Back
                </h1>
                <p class="text-gray-500 text-center mb-8">
                    Sign in to Data Navigator Application
                </p>

                <!-- Form -->
                <form class="space-y-5" onsubmit="return false;">
                    <!-- Username Input -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-[#0a1628] mb-2">
                            Username
                        </label>
                        <input
                            type="text"
                            id="username"
                            placeholder="Enter your username"
                            class="input-field w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg text-[#0a1628] placeholder-gray-400 transition-all"
                        />
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-[#0a1628] mb-2">
                            Password
                        </label>
                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            class="input-field w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg text-[#0a1628] placeholder-gray-400 transition-all"
                        />
                    </div>

                    <!-- Buttons -->
                    <div class="flex flex-col gap-3 pt-4">
                        <button
                            type="button"
                            onclick="handleSignUp()"
                            class="btn-signup w-full py-3 px-4 bg-[#f5b841] hover:bg-[#e5a831] text-[#0a1628] font-semibold rounded-lg transition-all duration-200 shadow-md cursor-pointer"
                        >
                            Sign Up
                        </button>
                        <button
                            type="button"
                            onclick="handleLoginSSO()"
                            class="btn-login-sso w-full py-3 px-4 bg-[#0a1628] border-2 border-[#0a1628] text-white hover:bg-[#1e3a5f] font-semibold rounded-lg transition-all duration-200 cursor-pointer"
                        >
                            Login SSO
                        </button>
                    </div>
                </form>

                <!-- Footer -->
                <p class="text-gray-400 text-sm text-center mt-8">
                    &copy; 2026 Data Navigator Application. All rights reserved.
                </p>
            </div>
        </div>
    </main>

    <script>
        function handleSignUp() {
            const username = document.getElementById('username').value;
            if (username.trim()) {
                alert(`Sign Up with username: ${username}`);
            } else {
                alert('Please enter a username');
            }
        }

        function handleLoginSSO() {
            alert('Redirecting to SSO login...');
            // 可以在这里添加实际的重定向逻辑
            // window.location.href = 'https://your-sso-provider.com/login';
        }

        // 按Enter键提交表单
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSignUp();
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSignUp();
        });
    </script>
</body>
</html>
